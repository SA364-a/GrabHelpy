<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GrabHelpy</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<h1>GrabHelpy</h1>

<div class="analyzers">

<div class="box">

<h3>Goal Analyzer</h3>

<input
type="text"
id="goalInput"
placeholder="Enter your goal">

<button onclick="analyzeGoal()">
Analyze Goal
</button>

</div>

<div class="box">

<h3>Budget Analyzer</h3>

<input
type="number"
id="budgetInput"
placeholder="Enter Budget">

<button onclick="analyzeBudget()">
Analyze Budget
</button>

</div>

<div class="box">

<h3>Regret Risk Analyzer</h3>

<textarea
id="regretInput"
rows="5"
placeholder="Paste product names">
</textarea>

<button onclick="analyzeRegret()">
Analyze Regret
</button>

</div>

</div>

<hr>

<h2>Browse Products</h2>

<div class="filters">

<div>

<label>Category</label>

<select id="categoryDropdown">

<option value="">
Select Category
</option>

</select>

</div>

<div>

<label>Subcategory</label>

<select id="subcategoryDropdown">

<option value="">
Select Subcategory
</option>

</select>

</div>

<div>

<label>Search Product</label>

<input
type="text"
id="productSearch"
placeholder="Search Product">

</div>

<div>

<label>Search</label>

<button onclick="searchProduct()">
Search
</button>

</div>

<div>

<label>Price Sort</label>

<select id="priceSort">

<option value="">
Default
</option>

<option value="low">
Low → High
</option>

<option value="high">
High → Low
</option>

</select>

</div>

</div>

<div id="analysisResult">
</div>

<hr>

<h2>Products</h2>

<div
id="productsGrid"
class="products-grid">
</div>

<script src="js/app.js"></script>

</body>
</html>
